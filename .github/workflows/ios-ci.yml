name: Swift Checks

on:
  pull_request:
    branches: [main, dev]

jobs:
  checks:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install swiftformat
          brew install swiftlint

      - name: SwiftFormat check
        run: swiftformat . --lint

      - name: SwiftLint check
        run: swiftlint