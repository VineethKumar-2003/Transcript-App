name: CodeQL

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  analyze:
    runs-on: macos-latest

    permissions:
      security-events: write
      contents: read

    strategy:
      matrix:
        language: [swift]

    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: swift

      - uses: github/codeql-action/analyze@v3